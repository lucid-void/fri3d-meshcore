name: Release to BadgeHub

# Push a vX.Y.Z tag and this builds the .mpk and publishes the app to BadgeHub.
# The TAG is the version: it is stamped into MANIFEST.JSON, which is the single source for
# name / description / long_description / author / version (tjorim/mpos-badgehub-publish reads
# them from there). Only BadgeHub-specific fields are inputs below.
#
# Requires the repo secret BADGEHUB_API_TOKEN: an API token for THIS project, minted with
#   POST https://badgehub.eu/api/v3/projects/org.fri3d.meshcore/token   (while logged in)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

concurrency:                 # two tags racing would fight over the same BadgeHub draft
  group: release
  cancel-in-progress: false

jobs:
  # Never publish something that has not been tested: same tests + bundle checks as CI.
  check:
    uses: ./.github/workflows/ci.yml

  release:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag (strip leading v)
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # BadgeHub cannot republish a version that already exists, and the publish step is the
      # LAST one -- so without this you find out after building and uploading everything.
      - name: Fail fast if this version is already published
        run: |
          published=$(curl -sf -H 'User-Agent: meshcore-ci' \
            "https://badgehub.eu/api/v3/projects/org.fri3d.meshcore" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['version']['app_metadata']['version'])" \
            || echo "none")
          echo "currently published: $published, releasing: $VERSION"
          if [ "$published" = "$VERSION" ]; then
            echo "::error::$VERSION is already published -- tag a new version"
            exit 1
          fi

      - name: Stamp the tag version into the MANIFEST
        run: |
          set -e
          f=org.fri3d.meshcore/MANIFEST.JSON
          sed -i -E 's/("version"[[:space:]]*:[[:space:]]*")[0-9]+\.[0-9]+\.[0-9]+(")/\1'"$VERSION"'\2/' "$f"
          python3 -c "import json; assert json.load(open('$f'))['version'] == '$VERSION', 'version not stamped into $f'"
          echo "stamped version $VERSION"

      - name: Build the .mpk
        id: package
        uses: tjorim/mpos-package-mpk@v1
        with:
          app-dir: org.fri3d.meshcore

      - uses: actions/upload-artifact@v4
        with:
          name: mpk
          path: ${{ steps.package.outputs.mpk-path }}
          if-no-files-found: error

      # Uploads the sources + the .mpk (the AppStore installs the .mpk -- BadgeHub does not
      # bundle one for you) and registers the icon, each part with its real MIME type.
      - name: Publish to BadgeHub
        uses: tjorim/mpos-badgehub-publish@v1
        with:
          slug: org.fri3d.meshcore        # must equal the MANIFEST fullname: the AppStore
          app-dir: org.fri3d.meshcore     # installs into apps/<slug> and rejects a .mpk whose
          icon: icon_64x64.png            # top-level folder is anything else
          mpk-path: ${{ steps.package.outputs.mpk-path }}
          api-token: ${{ secrets.BADGEHUB_API_TOKEN }}
          categories: Communication
          badges: mpos_api_0
          license-type: MIT
          git-url: https://github.com/lucid-void/fri3d-meshcore

      # Publishing succeeds whether or not the thing a badge actually downloads is there: a
      # green release once shipped an app nobody could install. Ask the store, not the log.
      - name: Verify the release is installable
        run: python3 tools/verify_release.py org.fri3d.meshcore "$VERSION"
